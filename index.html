<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Help me, MONOOOOOO!!</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 20px;
            font-size: 16px;
            padding-bottom: 50px;
            /* スクロールした時に下部に余白を持たせる */
        }

        h2 {
            margin-top: 0;
            margin-bottom: 5px;
            text-align: center;
        }

        h4 {
            margin-top: 0;
            margin-bottom: 10px;
            text-align: center;
        }

        .beta-disclaimer {
            text-align: center;
            font-size: 14px;
            color: #d9534f;
            margin-bottom: 15px;
            font-weight: bold;
        }

        /* Make inputs larger and easier to touch */
        input[type="text"],
        textarea {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            margin-bottom: 15px;
        }

        textarea {
            height: 100px;
            resize: vertical;
        }

        /* Large touch targets for radio buttons */
        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
        }

        .radio-group label {
            display: block;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            background-color: #f9f9f9;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
            /* Remove blue highlight on mobile */
        }



        /* Correct structure for pure CSS styling without :has() */
        .preset-container {
            position: relative;
        }

        .preset-container input[type="radio"] {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }

        .preset-container label {
            display: block;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            background-color: #f9f9f9;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .preset-container input[type="radio"]:checked+label {
            border-color: #303d2e;
            background-color: #d4edda;
            color: #303d2e;
        }

        /* Make submit button prominent */
        button[type="submit"] {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        button[type="submit"]:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        label.section-label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }
    </style>
</head>

<body>
    <h2>Help me, MONOOOOOO!!</h2>
    <h4>( °∀°)o彡° モーノ！ ( °∀°)o彡° モーノ！</h4>
    <p class="beta-disclaimer">※FURST CLASS公式とは一切関係ありません。
    </p>
    <form id="requestForm"
        action="https://script.google.com/macros/s/AKfycbz1muBXXyKKaVr7K3pzVb5uHoHq-04UM3Qy0o39waM_oZSYnuF7IZCTqUDQP8p5EYCv/exec"
        method="POST">

        <label class="section-label">名前</label>
        <input type="text" id="nameInput" name="name" required placeholder="ネームタグ表記・キャラ名" enterkeyhint="next">

        <label class="section-label">現在位置</label>
        <input type="text" id="locationInput" name="location" required placeholder="例：１階〇番ブース前" enterkeyhint="done">

        <label class="section-label">要件</label>
        <div class="radio-group">
            <div class="preset-container">
                <input type="radio" id="preset1" name="preset" value="（プリセット）通訳が必要です" checked>
                <label for="preset1">通訳をお願いしたい</label>
            </div>
            <div class="preset-container">
                <input type="radio" id="preset2" name="preset" value="運営側に質問したい">
                <label for="preset2">運営に質問したい</label>
            </div>
            <div class="preset-container">
                <input type="radio" id="presetCustom" name="preset" value="その他（自由入力）">
                <label for="presetCustom">その他（自由入力）</label>
            </div>
        </div>

        <textarea id="messageInput" name="customMessage" placeholder="詳細を入力…" enterkeyhint="done"
            inputmode="text"></textarea>

        <button type="submit" id="submitBtn">たすけて モーノ!!
            <span style="font-size: 16px; font-weight: normal;">（送信する）</span>
        </button>
    </form>

    <div id="resultMsg"
        style="margin-top: 15px; margin-bottom: 15px; font-weight: bold; font-size: 18px; text-align: center; white-space: pre-wrap;">
    </div>

    <script>
        const form = document.getElementById('requestForm');
        const nameInput = document.getElementById('nameInput');
        const locationInput = document.getElementById('locationInput');
        const messageInput = document.getElementById('messageInput');
        const resultMsg = document.getElementById('resultMsg');
        const submitBtn = document.getElementById('submitBtn');
        const presets = document.querySelectorAll('input[name="preset"]');

        // URLパラメータ（?name=〇〇）があれば取得
        const urlParams = new URLSearchParams(window.location.search);
        const nameParam = urlParams.get('name');

        // URLパラメータがあればそれを優先し、なければlocalStorageの保存値を使う
        nameInput.value = nameParam || localStorage.getItem('savedName') || '';
        locationInput.value = localStorage.getItem('savedLocation') || '';

        // 入力欄でエンターキーが押されたらキーボードを閉じる（＆誤送信を防ぐ）共通処理
        function closeKeyboardOnEnter(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault(); // ここでフォームの送信（または改行）をブロック
                e.target.blur();    // キーボードを閉じる
            }
        }

        // 名前の入力欄でエンター（次へ）が押されたら位置入力へフォーカスを移す
        nameInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                locationInput.focus(); // 次の入力欄へ移動
            }
        });

        // 位置・要件のエンターキー（完了）でキーボードを閉じる
        locationInput.addEventListener('keydown', closeKeyboardOnEnter);
        messageInput.addEventListener('keydown', closeKeyboardOnEnter);

        presets.forEach(radio => {
            radio.addEventListener('change', () => {
                messageInput.required = (radio.id !== 'preset1');

                // フォーカスを当てるIDのリスト（今後増えたらここに追加）
                const focusTargetIds = ['preset2', 'presetCustom'];

                if (focusTargetIds.includes(radio.id)) {
                    // 指定したプリセットが選ばれたらテキストエリアにフォーカス 
                    messageInput.focus();
                } else {
                    // それ以外は一番下（resultMsg付近）までスムーズにスクロール
                    setTimeout(() => {
                        resultMsg.scrollIntoView({ behavior: 'smooth', block: 'end' });
                    }, 100);
                }
            });
        });

        form.addEventListener('submit', function (e) {
            e.preventDefault();

            localStorage.setItem('savedName', nameInput.value);
            localStorage.setItem('savedLocation', locationInput.value);

            submitBtn.disabled = true;
            resultMsg.textContent = '腕を高く振り上げて...';
            resultMsg.style.color = '#333';

            const formData = new FormData(form);
            const selectedPreset = document.querySelector('input[name="preset"]:checked').value;

            formData.set('message', selectedPreset);
            formData.delete('preset');

            fetch(form.action, {
                method: 'POST',
                body: formData,
                mode: 'no-cors'
            }).then(() => {
                submitBtn.disabled = false;
                const now = new Date();
                const timeStr = now.toTimeString().split(' ')[0]; // HH:mm:ss形式を確実に取得
                resultMsg.textContent = '( °∀°)o彡° 腕を強く振り下ろした！\n(' + timeStr + ')';
                resultMsg.style.color = 'green';
                messageInput.value = '';
            }).catch(err => {
                submitBtn.disabled = false;
                resultMsg.textContent = '( ；∀；) 声が届かなかったようだ…\nもう一度腕を振り下ろそう！';
                resultMsg.style.color = 'red';
            });
        });
    </script>
</body>

</html>
